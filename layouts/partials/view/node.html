<article class="node-{{ (.Type) }}">
  <header>
    <div class="node-title">
      <h4 class="h5">
        <a href="{{ (.RelPermalink) }}">{{ (.Title) }}</a>
        <sup>{{ (partial "module/node/indicators" .) }}</sup>
      </h4>
    </div>
  </header>
  <div class="node-body">
      {{ (partial "module/node/summary" .) }}
  </div>
</article>
