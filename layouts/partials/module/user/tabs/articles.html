<div class="author-articles">
  <div>
    <div class="node-body">
      <ul>
          {{ range (.Data.Pages) }}
            <li class="{{ with (.Param "private") }}private-content{{ end }}">
              <a href="{{ (.Permalink) }}">{{ (.Title) }}</a>
            </li>
          {{ end }}
      </ul>
    </div>
  </div>
</div>
